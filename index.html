            width: 100%;
        }

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            color: #e8eef7;
            overflow: hidden;
        }

        /* Starfield animation */
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Stars background */
        .stars-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #a8dadc, #457b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .timer-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            margin-bottom: 15px;
        }

        .timer {
            font-size: 32px;
            font-weight: 700;
            color: #a8dadc;
            text-shadow: 0 0 10px rgba(168, 218, 220, 0.5);
            min-width: 80px;
            text-align: center;
        }

        .counter {
            font-size: 16px;
            color: #f1faee;
            padding: 8px 16px;
            background: rgba(70, 123, 157, 0.3);
            border-radius: 20px;
            border: 1px solid #457b9d;
        }

        .game-area {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .side {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(31, 58, 89, 0.4);
            border: 1px solid rgba(168, 218, 220, 0.3);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(10px);
        }

        .side.left {
            border-color: rgba(241, 250, 254, 0.2);
        }

        .side.right {
            border-color: rgba(168, 218, 220, 0.3);
        }

        .side-title {
            font-size: 14px;
            font-weight: 600;
            color: #a8dadc;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .zodiac-name {
            font-size: 20px;
            font-weight: 700;
            color: #f1faee;
            margin-bottom: 12px;
            text-align: center;
        }

        .planet-name {
            font-size: 20px;
            font-weight: 700;
            color: #a8dadc;
            margin-bottom: 12px;
            text-align: center;
        }

        .word-type {
            margin-bottom: 12px;
        }

        .word-type-label {
            font-size: 12px;
            color: #a8dadc;
            margin-bottom: 6px;
            opacity: 0.8;
        }

        .words-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 180px; 
            overflow-y: auto;
            align-content: flex-start;
        }

        .word-btn {
            padding: 6px 12px;
            background: rgba(70, 123, 157, 0.3);
            border: 1px solid rgba(168, 218, 220, 0.4);
            color: #e8eef7;
            border-radius: 16px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .word-btn:hover {
            background: rgba(70, 123, 157, 0.5);
            border-color: #a8dadc;
            color: #a8dadc;
        }

        .word-btn.selected {
            background: rgba(168, 218, 220, 0.6);
            border-color: #a8dadc;
            color: #0f1419;
            font-weight: 600;
            box-shadow: 0 0 12px rgba(168, 218, 220, 0.4);
        }

        .center-area {
            width: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .combine-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #a8dadc, #457b9d);
            border: none;
            color: #0f1419;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .combine-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(168, 218, 220, 0.4);
        }

        .combine-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .status-icon {
            font-size: 24px;
        }

        .start-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .start-screen h2 {
            font-size: 28px;
            background: linear-gradient(135deg, #a8dadc, #457b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .start-screen p {
            font-size: 16px;
            color: #b8c6db;
            text-align: center;
            max-width: 400px;
        }

        .start-btn {
            padding: 14px 40px;
            background: linear-gradient(135deg, #a8dadc, #457b9d);
            border: none;
            color: #0f1419;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;

            box-shadow: 0 12px 30px rgba(168, 218, 220, 0.3);

            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px;
            overflow-y: auto;

            color: #a8dadc;

            font-weight: 700;
            background: linear-gradient(135deg, #a8dadc, #f1faee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;

            border-radius: 8px;
            text-align: center;
            animation: slideIn 0.3s ease;

            to {

            margin-bottom: 8px;

            font-size: 21px;

            margin-top: 10px;

            background: rgba(168, 218, 220, 0.3);
            box-shadow: 0 4px 12px rgba(168, 218, 220, 0.2);
        }

        .hidden {
            display: none;

      <div class="center-area">

       <button class="combine-btn" id="combineBtn" onclick="combineWords()" disabled> 組合 </button>

      <div class="side right">

      </div>
     </div>
    </div>
    
    <div id="resultScreen" class="result-screen hidden">

      <h2>🌟 挑戰完成！</h2>

     </div>
     <div class="combinations-list" id="combinationsList"></div>
     <div class="result-actions">
      <button class="combine-btn" onclick="restartGame()">再次挑戰</button> 
      <button class="btn-secondary" onclick="shareResult()">分享結果</button>
     </div>
    </div>

  </div>

            { name: '摩羯座', adj: ['成熟的', '傳統的', '專業的', '權威的'], adv: ['緩慢地', '謹慎地', '節約地', '困難地'] },
            { name: '水瓶座', adj: ['前衛的', '友善的', '進步的', '未來的'], adv: ['意外地', '突然地', '特別地', '激烈地'] },
            { name: '雙魚座', adj: ['模糊的', '仁慈的', '犧牲的', '浪漫的'], adv: ['不明確地', '隱藏地', '迷糊地', '虛弱地'] }
        ];

        // Game State
        let gameState = {
            currentZodiac: null,
            currentPlanet: null,
            selectedAdj: null,
            selectedAdv: null,
            selectedNoun: null,
            selectedVerb: null,
            timeLeft: 60,
            combinations: [],
            gameActive: false,
            timerInterval: null
        };

        // Create starfield
        function createStars() {
            const starsBg = document.getElementById('starsBg');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsBg.appendChild(star);
            }
        }

        // Start game
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            document.getElementById('resultScreen').classList.add('hidden');

            gameState.gameActive = true;
            gameState.timeLeft = 60;
            gameState.combinations = [];
            gameState.selectedAdj = null;
            gameState.selectedAdv = null;
            gameState.selectedNoun = null;
            gameState.selectedVerb = null;

            generateNewPair();
            startTimer();
        }

        // Generate new zodiac and planet pair
        function generateNewPair() {
            gameState.currentZodiac = signs[Math.floor(Math.random() * signs.length)];
            gameState.currentPlanet = planets[Math.floor(Math.random() * planets.length)];
            
            gameState.selectedAdj = null;
            gameState.selectedAdv = null;
            gameState.selectedNoun = null;
            gameState.selectedVerb = null;

            renderZodiacWords();
            renderPlanetWords();
            updateCombineButton();
        }

        // Render zodiac words
        function renderZodiacWords() {
            document.getElementById('zodiacName').textContent = gameState.currentZodiac.name;
            
            const adjContainer = document.getElementById('adjContainer');
            adjContainer.innerHTML = '';
            gameState.currentZodiac.adj.forEach(word => {
                const btn = document.createElement('button');
                btn.className = 'word-btn';
                btn.textContent = word;
                btn.onclick = () => selectAdj(btn, word);
                adjContainer.appendChild(btn);
            });

            const advContainer = document.getElementById('advContainer');
            advContainer.innerHTML = '';
            gameState.currentZodiac.adv.forEach(word => {
                const btn = document.createElement('button');
                btn.className = 'word-btn';
                btn.textContent = word;
                btn.onclick = () => selectAdv(btn, word);
                advContainer.appendChild(btn);
            });
        }

        // Render planet words
        function renderPlanetWords() {
            document.getElementById('planetName').textContent = gameState.currentPlanet.name;
            
            const nounContainer = document.getElementById('nounContainer');
            nounContainer.innerHTML = '';
            gameState.currentPlanet.noun.forEach(word => {
                const btn = document.createElement('button');
                btn.className = 'word-btn';
                btn.textContent = word;
                btn.onclick = () => selectNoun(btn, word);
                nounContainer.appendChild(btn);
            });

            const verbContainer = document.getElementById('verbContainer');
            verbContainer.innerHTML = '';
            gameState.currentPlanet.verb.forEach(word => {
                const btn = document.createElement('button');
                btn.className = 'word-btn';
                btn.textContent = word;
                btn.onclick = () => selectVerb(btn, word);
                verbContainer.appendChild(btn);
            });
        }

        // Selection handlers
        function selectAdj(btn, word) {
            document.querySelectorAll('#adjContainer .word-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            gameState.selectedAdj = word;
            updateCombineButton();
        }

        function selectAdv(btn, word) {
            document.querySelectorAll('#advContainer .word-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            gameState.selectedAdv = word;
            updateCombineButton();
        }

        function selectNoun(btn, word) {
            document.querySelectorAll('#nounContainer .word-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            gameState.selectedNoun = word;
            updateCombineButton();
        }

        function selectVerb(btn, word) {
            document.querySelectorAll('#verbContainer .word-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            gameState.selectedVerb = word;
            updateCombineButton();
        }

        // Update combine button state
        function updateCombineButton() {
            const allSelected = gameState.selectedAdj && gameState.selectedAdv && gameState.selectedNoun && gameState.selectedVerb;
            document.getElementById('combineBtn').disabled = !allSelected;
        }

        // Combine words
        function combineWords() {
            const combination = {
                zodiac: gameState.currentZodiac.name,
                planet: gameState.currentPlanet.name,
                phrase: `${gameState.selectedAdv}${gameState.selectedVerb} ${gameState.selectedAdj}${gameState.selectedNoun}`
            };

            gameState.combinations.push(combination);
            document.getElementById('completedCount').textContent = gameState.combinations.length;

            generateNewPair();
        }

        // Timer
        function startTimer() {
            gameState.timerInterval = setInterval(() => {
                gameState.timeLeft--;
                document.getElementById('timer').textContent = gameState.timeLeft;

                if (gameState.timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            clearInterval(gameState.timerInterval);
            gameState.gameActive = false;

            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');

            document.getElementById('finalScore').textContent = gameState.combinations.length;

            const combinationsList = document.getElementById('combinationsList');
            combinationsList.innerHTML = '';
            gameState.combinations.forEach((combo, index) => {
                const item = document.createElement('div');
                item.className = 'combination-item';
                item.innerHTML = `
                    <div class="header"><span class="planet">${combo.zodiac}</span>✕<span style="margin-left: 4px;">${combo.planet}</span></div>
                    <div class="phrase">"${combo.phrase}"</div>
                `;
                combinationsList.appendChild(item);
            });
        }

        // Restart game
        function restartGame() {
            document.getElementById('resultScreen').classList.add('hidden');
            startGame();
        }

        // Share result
        function shareResult() {
            const score = gameState.combinations.length;
            const shareText = `🌟 我在《星光煉金術：1分鐘占星文法挑戰》中完成了 ${score} 組占星文法組合！你能超越我的成績嗎？✨`;
            
            if (navigator.share) {
                navigator.share({
                    title: '星光煉金術',
                    text: shareText
                }).catch(err => console.log('Share failed:', err));
            } else {
                // Fallback: copy to clipboard
                navigator.clipboard.writeText(shareText).then(() => {
                    alert('分享文字已複製到剪貼板！');
                });
            }
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            createStars();
        });
    </script>
</body>
</html>
