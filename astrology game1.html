<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星光煉金術：1分鐘占星文法挑戰 (完整詞彙版)</title>
    <style>
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 900px;
            width: 95%;
            text-align: center;
            position: relative;
        }
        h1 { color: #fbbf24; margin-bottom: 10px; }
        .instructions { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        .btn {
            background-color: #fbbf24;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { background-color: #f59e0b; }
        
        /* Game Screen */
        #game-screen, #end-screen { display: none; }
        .top-bar { display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 10px;}
        .timer { color: #ef4444; }
        .cards { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 30px; }
        .card {
            background: #334155;
            padding: 20px;
            border-radius: 10px;
            flex: 1;
            border: 1px solid #475569;
            display: flex;
            flex-direction: column;
            max-height: 50vh;
        }
        .card-title { font-size: 24px; color: #fbbf24; margin-bottom: 15px; font-weight: bold; border-bottom: 1px solid #475569; padding-bottom: 10px;}
        .word-group { margin-bottom: 15px; text-align: left; display: flex; flex-direction: column; overflow: hidden;}
        .word-label { font-size: 14px; color: #fbbf24; display: block; margin-bottom: 5px; font-weight: bold;}
        
        /* 針對長詞彙加上捲軸設計 */
        .word-content { 
            font-size: 15px; 
            color: #e2e8f0; 
            line-height: 1.6;
            max-height: 110px;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        /* End Screen */
        .result-list { max-height: 40vh; overflow-y: auto; text-align: left; margin-top: 20px; padding-right: 10px; }
        .result-item { background: #334155; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .result-title { color: #fbbf24; font-weight: bold; margin-bottom: 5px; }
        .result-desc { font-size: 14px; color: #cbd5e1; line-height: 1.5; }
        
        /* Scrollbar styles */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px;}
        ::-webkit-scrollbar-thumb { background: #64748b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>

    <!-- Start Screen -->
    <div id="start-screen" class="container">
        <h1>星光煉金術</h1>
        <p class="instructions">1分鐘占星文法挑戰：這是一次詞彙量超載的挑戰！<br>請從隨機出現的龐大「星座形容語」與「行星名詞/動詞」中，快速挑選組合並造句。準備好了嗎？</p>
        <button class="btn" onclick="startGame()">開始挑戰</button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="container">
        <div class="top-bar">
            <div>組合數: <span id="score">0</span></div>
            <div class="timer">剩餘時間: <span id="time">60</span>s</div>
        </div>
        <div class="cards">
            <div class="card">
                <div class="card-title" id="planet-name">行星</div>
                <div class="word-group">
                    <span class="word-label">【名詞提示 (人/事/物/地/身)】</span>
                    <div class="word-content" id="planet-noun">...</div>
                </div>
                <div class="word-group">
                    <span class="word-label">【動詞提示】</span>
                    <div class="word-content" id="planet-verb">...</div>
                </div>
            </div>
            <div class="card">
                <div class="card-title" id="sign-name">星座</div>
                <div class="word-group">
                    <span class="word-label">【形容詞提示】</span>
                    <div class="word-content" id="sign-adj">...</div>
                </div>
                <div class="word-group">
                    <span class="word-label">【副詞提示】</span>
                    <div class="word-content" id="sign-adv">...</div>
                </div>
            </div>
        </div>
        <button class="btn" onclick="nextQuestion()">我已想好！完成組合</button>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="container">
        <h1>時間到！結算報告</h1>
        <p>你在1分鐘內完成了 <strong style="color:#fbbf24; font-size: 24px;" id="final-score">0</strong> 組占星文法。</p>
        <div class="result-list" id="result-list"></div>
        <button class="btn" style="margin-top: 20px;" onclick="location.reload()">再玩一次</button>
    </div>

    <script>
        // 資料庫：完整收錄自文獻的 10 大行星與 12 星座詞彙庫
        const planets = [
            {
                name: '太陽',
                noun: '父親、男性伴侶、英雄、演員、男主角、生命中重要的人物、生命的力量、追求的事情、成為英雄的事、成就自己生命的事情、自我的尋找、黃金、心臟、發光發亮的東西、光、燈、螢火、向日葵、電影院、戲劇院、表演舞台、遊樂園、健身房、脊椎',
                verb: '照亮、拍手、喝采、創造、集中、圍繞、表演'
            },
            {
                name: '月亮',
                noun: '母親、女性、照顧者、保母、保全、廚師、作家、畫家、編劇、詩人、護士、看護、幼教老師、照顧、養育、扶養、滋養、銀、鏡子、容器、烹煮食物的鍋具、食物、牛奶、蘑菇、餐廳、幼稚園、水、海、消化系統（特別指胃）、乳房、子宮',
                verb: '餵、養、吃、照顧、哺乳、滋養、關懷、保護'
            },
            {
                name: '水星',
                noun: '兄弟姐妹、鄰居、親戚、學生、同學、每天與你生活周圍的人、商人、傳遞訊息的人、文字工作者、業務員、小學老師、名嘴、作家、傳播人、創意人、記者、導遊、指揮交通的人、叫賣的人、學習、上課、溝通、知識、新聞、水銀、書、文具、檔、教材、報紙、電話、通訊器材、隨身碟、交通工具、鄰近公園、菜市場、書店、圖書館、小學、文具行、影印店、傳播公司、雜貨店、便利商店、雙手、手臂、神經系統、呼吸器官',
                verb: '聽、說、讀、寫、學習、表達、思考、移動、交易、斡旋'
            },
            {
                name: '金星',
                noun: '少女、女孩、美女、戀愛中的女人、藝術家、歌手、音樂家、設計師、化妝師、外交人員、財務人員、農夫、戀愛、生產、衡量價值、評價、銅、珠寶、金錢、藝術品、牛、保險箱、珠寶盒、音樂廳、美術館、歌劇院、銀行、腎臟、腰、喉嚨、脖子、甲狀腺',
                verb: '喜歡、愛、付出、建立關係、弱化、美化、嬌飾、包裝'
            },
            {
                name: '火星',
                noun: '年輕男性、戰士、將軍、武士、員警、冒險家、軍人、消防員、運動員、牙醫、歹徒、外科醫生、理髮師、保護、生氣、競爭、攻擊、性愛、冒險、挑戰、比賽、發燒、外傷、發炎、戰爭、技術、打架、鐵、機械、武器、工具、角、羊、火、火把、打火機、運動場、競技場、賽馬場、健身房、頭、眼睛、肌肉、含鐵細胞、腎上腺',
                verb: '執行、前進、取得、掠奪、攻擊、破壞'
            },
            {
                name: '木星',
                noun: '法官、律師、教授、富人、神職人員、政客、職業與旅行有關的人、出版傳播行業的人、放縱的人、說謊或冒險的人、樂觀的人、貴人、擴張、相信、法律事件、宗教事件、冒險事件、犯罪事件、出版、公開的事件、旅行、宗教、流行的事物、錫、飛機、宗教物品、洋蔥、蒜、大學、教堂、法院、肝臟、腦下垂體、大腿與臀部',
                verb: '擴大、探索、冒險、成長、逃脫、逃避'
            },
            {
                name: '土星',
                noun: '父親、男性長輩、老年人、執政者、老闆、老師、上司、長官、有野心的人、執法者、嚴肅的人、專家、研究人員、仲裁者、不愉快的事情、壓抑限制的事件、責任範圍、組織架構、時間、鉛、堅固的物品、沉重的物品、老舊的物品、時鐘、柵欄、門、鎖、牆、公司、政府機關、高山、骨骼、牙齒、膝蓋、皮膚',
                verb: '阻擋、壓抑、限制、保護、承擔、組織、考驗、收縮'
            },
            {
                name: '天王星',
                noun: '改革者、反叛者、獨立的人、特立獨行的人、特殊的人、不受管轄的人、占星師、太空人、科學家、電腦工程師、獨立或革命、改變自我、改變性的事件、鈾、電腦與尖端科技產品、空氣、大氣層、X光、放射線、太空梭、太空署、天文臺、外太空、小腿、腳踝、循環系統',
                verb: '覺醒、分離、改變、背叛、切割、解放、突破、跨越'
            },
            {
                name: '海王星',
                noun: '神父、修女、宗教家、騙子、藝術家、理想主義者、精神異常者、吸毒者、酒精中毒者、電影工作者、電影、藝術、音樂、舞蹈、水災、中毒、生病、社會主義、共產主義、與聲光藝術有關的事情、錼、病毒、迷幻藥、麻醉藥、毒品、化學物品、人工合成品、攝影機、照相機、霧、大海、醫院、監獄、美術館、電影院、慈善機構、腳掌、視覺神經',
                verb: '犧牲、逃避、迷失、消融、腐蝕、救贖、擴散、精煉、上癮、臣服、放棄、撤除'
            },
            {
                name: '冥王星',
                noun: '礦工、殯葬業者、恐怖份子、心理諮商師、間諜、黑道、幕後主使者、刑警、狗仔、神秘學、心理學、恐怖主義、整合的過程、重新發現與挖掘的事件、犯罪事件、間諜與謀略事件、禁忌的事、鈽、石油、礦產、寶藏、墓園、殯儀館、太平間、臨終病房、生殖器',
                verb: '揭露、大掃除、死亡、蛻變、掩埋、調查、挖掘、控制、掠奪'
            }
        ];

        const signs = [
            { name: '牡羊座', adj: '單純的、快速的、獨立的、搶先的、直接的', adv: '快速地、簡單地、直接地、毫不遲疑地、勇敢地' },
            { name: '金牛座', adj: '固執的、優雅的、平靜的、珍貴的、迷人的', adv: '緩慢地、堅定地、賞心悅目地、有禮貌地、穩固地' },
            { name: '雙子座', adj: '溝通的、交流的、學習的、商業的、輕盈的', adv: '迅速地、表面地、就近地、吵雜地、靈敏地' },
            { name: '巨蟹座', adj: '情緒的、保護的、熟悉的、念舊的、敏感的', adv: '舒適地、濃厚地、激動地、不安地、不捨地' },
            { name: '獅子座', adj: '光亮的、熱情的、尊貴的、榮耀的、自信的', adv: '張揚地、無懼地、神采奕奕地、大方地、驕傲地' },
            { name: '處女座', adj: '完美的、挑剔的、仔細的、有用的、健康的', adv: '節約地、精確地、焦慮地、反覆地、精益求精地' },
            { name: '天秤座', adj: '互助的、社交的、取捨的、平衡的、中立的', adv: '猶豫地、平等地、公正地、得體地、和諧地' },
            { name: '天蠍座', adj: '忠實的、恐懼的、私密的、深層的、重生的', adv: '死心眼地、深入地、小心地、極端地、險象環生地' },
            { name: '射手座', adj: '開心的、慷慨的、樂觀的、高遠的、理想的', adv: '宏觀地、幸運地、無心地、誇大地、虛張聲勢地' },
            { name: '摩羯座', adj: '成熟的、傳統的、保守的、專業的、權威的', adv: '緩慢地、謹慎地、猶疑地、節約地、困難地' },
            { name: '水瓶座', adj: '前衛的、友善的、人道的、未來的、進步的', adv: '意外地、突然地、叛逆地、特別地、激烈地' },
            { name: '雙魚座', adj: '模糊的、仁慈的、犧牲的、迷失的、浪漫的', adv: '不明確地、隱藏地、迷糊地、混亂地、虛弱地' }
        ];

        let score = 0;
        let timeLeft = 60;
        let timerInterval;
        let completedPairs = [];
        let currentPlanet = null;
        let currentSign = null;

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            score = 0;
            timeLeft = 60;
            completedPairs = [];
            document.getElementById('score').innerText = score;
            document.getElementById('time').innerText = timeLeft;
            
            nextQuestion(false);

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time').innerText = timeLeft;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function nextQuestion(isScoring = true) {
            if (isScoring && currentPlanet && currentSign) {
                score++;
                document.getElementById('score').innerText = score;
                completedPairs.push({ planet: currentPlanet, sign: currentSign });
            }

            currentPlanet = planets[Math.floor(Math.random() * planets.length)];
            currentSign = signs[Math.floor(Math.random() * signs.length)];

            document.getElementById('planet-name').innerText = currentPlanet.name;
            document.getElementById('planet-noun').innerText = currentPlanet.noun;
            document.getElementById('planet-verb').innerText = currentPlanet.verb;

            document.getElementById('sign-name').innerText = currentSign.name;
            document.getElementById('sign-adj').innerText = currentSign.adj;
            document.getElementById('sign-adv').innerText = currentSign.adv;
            
            // 重置捲軸位置到最上方
            document.getElementById('planet-noun').scrollTop = 0;
            document.getElementById('planet-verb').scrollTop = 0;
            document.getElementById('sign-adj').scrollTop = 0;
            document.getElementById('sign-adv').scrollTop = 0;
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('end-screen').style.display = 'block';
            document.getElementById('final-score').innerText = score;

            let resultHTML = "";
            completedPairs.forEach((pair, index) => {
                let advWord = pair.sign.adv.split('、'); // 取第一個副詞代表
                let adjWord = pair.sign.adj.split('、'); // 取第一個形容詞代表
                let verbWord = pair.planet.verb.split('、'); // 取第一個動詞代表
                let nounWord = pair.planet.noun.split('、'); // 取第一個名詞代表

                let interpretation = `這代表一股能量驅動：你傾向以「${advWord}」的方式去進行「${verbWord}」；或者在面對與「${nounWord}」相關的人事物時，自然地展現出「${adjWord}」的特質。`;

                resultHTML += `
                    <div class="result-item">
                        <div class="result-title">${index + 1}. ${pair.sign.name} × ${pair.planet.name}</div>
                        <div class="result-desc">【解析】${interpretation}</div>
                    </div>
                `;
            });
            document.getElementById('result-list').innerHTML = resultHTML;
        }
    </script>
</body>
</html>
